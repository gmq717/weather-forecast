<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气预报</title>
    <link rel="stylesheet" href="style.css?v=2026040709">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤 天气预报</h1>
            <p class="subtitle">自动定位，实时天气</p>
        </header>

        <main>
            <!-- 定位按钮 -->
            <div class="location-section">
                <button id="locateBtn" class="btn-primary">
                    📍 获取当前位置天气
                </button>
                <p class="or-divider">或</p>
                <div class="city-input-group">
                    <input type="text" id="cityInput" placeholder="输入城市名称（如：北京）">
                    <button id="searchBtn" class="btn-secondary">查询</button>
                </div>
            </div>

            <!-- 加载状态 -->
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>正在获取天气信息...</p>
            </div>

            <!-- 错误提示 -->
            <div id="error" class="error hidden">
                <p id="errorMessage"></p>
            </div>

            <!-- 天气信息卡片 -->
            <div id="weatherCard" class="weather-card hidden">
                <div class="weather-header">
                    <h2 id="cityName">--</h2>
                    <p id="updateTime">更新时间：--</p>
                </div>

                <div class="weather-main">
                    <div class="temperature">
                        <span id="temp">--</span>
                        <span class="unit">°C</span>
                    </div>
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="天气图标">
                        <p id="weatherDesc">--</p>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-item">
                        <span class="label">💧 湿度</span>
                        <span id="humidity" class="value">--%</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">💨 风速</span>
                        <span id="windSpeed" class="value">--</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">👁 能见度</span>
                        <span id="visibility" class="value">-- km</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">🌡 体感温度</span>
                        <span id="feelsLike" class="value">--°C</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">🌤 气压</span>
                        <span id="pressure" class="value">-- hPa</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">💧 露点</span>
                        <span id="dew" class="value">--°C</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">🌧 降水量</span>
                        <span id="precip" class="value">-- mm</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">☁️ 云量</span>
                        <span id="cloud" class="value">--%</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">🌅 日出</span>
                        <span id="sunrise" class="value">--:--</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">🌇 日落</span>
                        <span id="sunset" class="value">--:--</span>
                    </div>
                </div>
            </div>

            <!-- 天气预警 -->
            <div id="weatherWarning" class="warning hidden">
                <div class="warning-header">
                    <span class="warning-icon">⚠️</span>
                    <h3 id="warningTitle">天气预警</h3>
                </div>
                <div id="warningContent" class="warning-content">
                    <!-- 预警内容将通过JS动态生成 -->
                </div>
            </div>

            <!-- 空气质量 -->
            <div id="airQuality" class="air-quality hidden">
                <h3>空气质量</h3>
                <div class="air-quality-main">
                    <div class="aqi-value">
                        <span id="aqi">--</span>
                        <span id="aqiLevel" class="aqi-level">--</span>
                    </div>
                    <div class="aqi-details">
                        <div class="aqi-item">
                            <span class="label">PM2.5</span>
                            <span id="pm2p5">-- μg/m³</span>
                        </div>
                        <div class="aqi-item">
                            <span class="label">PM10</span>
                            <span id="pm10">-- μg/m³</span>
                        </div>
                        <div class="aqi-item">
                            <span class="label">O₃</span>
                            <span id="o3">-- μg/m³</span>
                        </div>
                        <div class="aqi-item">
                            <span class="label">NO₂</span>
                            <span id="no2">-- μg/m³</span>
                        </div>
                        <div class="aqi-item">
                            <span class="label">SO₂</span>
                            <span id="so2">-- μg/m³</span>
                        </div>
                        <div class="aqi-item">
                            <span class="label">CO</span>
                            <span id="co">-- mg/m³</span>
                        </div>
                    </div>
                </div>
            </div>


            <!-- 未来预报 -->
            <div id="forecast" class="forecast hidden">
                <h3>未来3天预报</h3>
                <div id="forecastList" class="forecast-list">
                    <!-- 预报项目将通过JS动态生成 -->
                </div>
            </div>
        </main>

        <footer>
            <p>© <span id="currentYear"></span> 天气预报 | 数据由 和风天气 提供</p>
        </footer>
    </div>

    <script src="app.js?v=2026040710"></script>
</body>
</html>
